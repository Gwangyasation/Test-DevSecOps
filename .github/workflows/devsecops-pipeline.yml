        #run: |
          #echo "=== Vulnerabilities structure ==="
          #cat tmas_scan_report.json | jq '.vulnerabilities'
        
          #echo "=== Raw JSON keys ==="
          #cat tmas_scan_report.json | jq 'keys'

          #CRITICAL=$(cat tmas_scan_report.json | jq '.vulnerabilities.criticalCount // 0')
          #HIGH=$(cat tmas_scan_report.json | jq '.vulnerabilities.highCount // 0')
          #MEDIUM=$(cat tmas_scan_report.json | jq '.vulnerabilities.mediumCount // 0')

          #echo "Critical : $CRITICAL"
          #echo "High     : $HIGH"
          #echo "Medium   : $MEDIUM"
    
          ## TMAS action v3 เก็บผลใน environment variable แทน
          #echo "=== TMAS Scan Output ==="
          # ${{ steps.tmas.outcome }} คือการถามว่า step ชื่อ "tmas" ผลเป็นยังไง
          #echo "Exit code from TMAS: ${{ steps.tmas.outcome }}" 
    
          #if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ] || [ "$MEDIUM" -gt 0 ]; then
            #echo "Found vulnerabilities! Blocking pipeline."
          #exit 1
          #fi
    
            #echo "TMAS scan passed."

  # --- JOB 2: CD Process บน Self-hosted Runner ---
  cd-process:
    needs: ci-process
    runs-on: self-hosted
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}  # ✅ expose เป็น env var ให้ envsubst ใช้ได้
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Pull image ล่าสุดลงเครื่อง VM
      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest

      #2. Check Minikube status
      - name: Check Minikube status
        run: |
          minikube status || minikube start
          kubectl wait --for=condition=Ready node/minikube --timeout=60s
          kubectl cluster-info

      # 3. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          # ✅ ใช้ envsubst แทนค่า $DOCKERHUB_USERNAME ใน deployment.yaml ก่อน apply
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml

          # สั่ง Restart เพื่อให้ดึง Image ล่าสุดมาใช้
          kubectl rollout restart deployment/myapp-deployment

          # รอตรวจสอบสถานะจนกว่าจะ Rollout สำเร็จ
          kubectl rollout status deployment/myapp-deployment

    # 4. Forward port for Kubernetes
      #- name: Forward Port for Kubernetes
        #run: |
          # 1. ค้นหาและปิดการทำงานของ port-forward ตัวเก่าก่อน (ถ้ามี)
          #pkill -f "kubectl port-forward" || true
          # 2. ปิด process ที่ใช้ port 30010 อยู่
          #fuser -k 30010/tcp || true
          #sleep 2
          # 3. รัน port-forward ใหม่
          #kubectl port-forward --address 0.0.0.0 service/myapp-service 30011:80 &

      # 3. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          envsubst < k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          # ไม่ต้องมี kubectl apply -f k8s/ingress.yaml ถ้าจะเอาแค่พอร์ต 80 ก่อน

          kubectl rollout restart deployment/myapp-deployment
          kubectl rollout status deployment/myapp-deployment

      # 4. ตรวจสอบสถานะ (ไม่ต้องใช้ sudo port-forward แล้ว)
      - name: Verify Service
        run: |
          kubectl get svc myapp-service
          echo "Service is updated. Access via VM IP on port 80"
