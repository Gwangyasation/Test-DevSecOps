name: Lab 3 CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  # --- JOB 1: ทำงานบน GitHub Hosted Runner ---
  ci-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Code Scan with Sonarqube
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=Gwangyasation_Test-DevSecOps
            -Dsonar.organization=gwangyasation
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest

  # --- JOB 2: CD Process บน Self-hosted Runner ---
  cd-process:
    needs: ci-process
    runs-on: self-hosted
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}  # ✅ expose เป็น env var ให้ envsubst ใช้ได้
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Pull image ล่าสุดลงเครื่อง VM
      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest

      # 2. Check Minikube status
      - name: Check Minikube status
        run: |
          minikube status || minikube start
          kubectl cluster-info

      # 3. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          # ✅ ใช้ envsubst แทนค่า $DOCKERHUB_USERNAME ใน deployment.yaml ก่อน apply
          envsubst < k8s/deployment.yaml | kubectl apply -f -

          # สั่ง Restart เพื่อให้ดึง Image ล่าสุดมาใช้
          kubectl rollout restart deployment/myapp-deployment

          # รอตรวจสอบสถานะจนกว่าจะ Rollout สำเร็จ
          kubectl rollout status deployment/myapp-deployment
