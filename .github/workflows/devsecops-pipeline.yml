        #env:
          #SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #SONAR_HOST_URL: https://sonarcloud.io
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest
          
      # --- เพิ่มขั้นตอนสแกน TMAS ผ่าน TrendMicro ---
      - name: Scan Image with TMAS
        # ชื่อ Step ที่ตั้งเพื่อให้ Step อื่นใน Job อ้างอิงถึงได้
        id: tmas 
        uses: trendmicro/tmas-scan-action@v3.1.0
        with:
          version: 'latest'
          vulnerabilitiesScan: true
          malwareScan: true
          artifact: registry:${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest
          additionalArgs: --region=ap-southeast-1
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      ## เพิ่ม step นี้ต่อท้าย เพื่อ fail pipeline เอง
