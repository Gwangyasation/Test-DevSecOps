name: Lab 3 CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  # --- JOB 1: ทำงานบน GitHub Hosted Runner ---
  ci-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Code Scan with Sonarqube
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=Gwangyasation_Test-DevSecOps
            -Dsonar.organization=gwangyasation
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # เปลี่ยน 'node-remote-test' เป็นชื่อ image ของคุณ
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest

# --- JOB 2: CD Process บน Self-hosted Runner (Lab 4) ---
  cd-process:
    needs: ci-process
    runs-on: self-hosted
    steps:
      # 1. Pull image ล่าสุดลงเครื่อง VM
      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest

      # 2. Check Minikube status
      - name: Check Minikube status
        run: |
          minikube status || minikube start
          kubectl cluster-info

      # 3. Roll out / Update to latest Container
      - name: Deploy to Kubernetes
        run: |
          # 1. สร้างหรืออัปเดต Deployment จากไฟล์ config (ต้องมีไฟล์นี้ในโปรเจกต์)
          kubectl apply -f k8s/deployment.yaml
          
          # 2. สั่ง Restart เพื่อให้ดึง Image ล่าสุดมาใช้
          kubectl rollout restart deployment/my-app-deployment
          
          # 3. รอตรวจสอบสถานะจนกว่าจะ Rollout สำเร็จ
          kubectl rollout status deployment/my-app-deployment
