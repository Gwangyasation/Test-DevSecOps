name: Lab 3 CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  # --- JOB 1: ทำงานบน GitHub Hosted Runner ---
  ci-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #- name: Code Scan with Sonarqube
        #uses: SonarSource/sonarqube-scan-action@v6
        #with:
          #args: >
            #-Dsonar.projectKey=Gwangyasation_Test-DevSecOps
