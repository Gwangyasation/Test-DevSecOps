name: Lab 3 CI/CD Pipeline
on:
  push:
    branches: [ "main" ]
jobs:
  # --- JOB 1: ทำงานบน GitHub Hosted Runner ---
  ci-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Code Scan with Sonarqube
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=Gwangyasation_Test-DevSecOps
            -Dsonar.organization=gwangyasation
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest
      # --- เพิ่มขั้นตอนสแกน TMAS ผ่าน TrendMicro ---
      - name: Scan Image with TMAS
        uses: trendmicro/tmas-scan-action@v3.1.0
        with:
          version: 'latest'
          vulnerabilitiesScan: true
          malwareScan: true
          artifact: registry:${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest
          additionalArgs: --region=ap-southeast-1
                          --saveScanResult
          tmasApiKey: ${{ secrets.TMAS_API_KEY }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      # เพิ่ม step นี้ต่อท้าย เพื่อ fail pipeline เอง
      - name: Check TMAS Result and Block if Unsafe
        run: |
          RESULT=$(cat tmas-scan-result.json)
          CRITICAL=$(echo $RESULT | jq '.vulnerabilities.criticalCount // 0')
          HIGH=$(echo $RESULT | jq '.vulnerabilities.highCount // 0')
          MEDIUM=$(echo $RESULT | jq '.vulnerabilities.mediumCount // 0')
    
          echo "Critical: $CRITICAL"
          echo "High: $HIGH"
          echo "Medium: $MEDIUM"
    
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ] || [ "$MEDIUM" -gt 0 ]; then
            echo "Found vulnerabilities! Blocking pipeline."
          exit 1
          fi
    
            echo "No critical/high/medium vulnerabilities found."

  # --- JOB 2: CD Process บน Self-hosted Runner ---
  cd-process:
    needs: ci-process
    runs-on: self-hosted
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}  # ✅ expose เป็น env var ให้ envsubst ใช้ได้
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 1. Pull image ล่าสุดลงเครื่อง VM
      - name: Pull image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/node-remote-test:latest

      # 2. Check Minikube status
      #- name: Check Minikube status
      #  run: |
      #    minikube status || minikube start
      #    kubectl wait --for=condition=Ready node/minikube --timeout=60s
      #    kubectl cluster-info

      # 3. Deploy to Kubernetes
      - name: Deploy to Kubernetes
        run: |
          # ✅ ใช้ envsubst แทนค่า $DOCKERHUB_USERNAME ใน deployment.yaml ก่อน apply
          envsubst < k8s/deployment.yaml | kubectl apply -f -

          # สั่ง Restart เพื่อให้ดึง Image ล่าสุดมาใช้
          kubectl rollout restart deployment/myapp-deployment

          # รอตรวจสอบสถานะจนกว่าจะ Rollout สำเร็จ
          kubectl rollout status deployment/myapp-deployment

    # 4. Forward port for Kubernetes
      - name: Forward Port for Kubernetes
        run: |
          # 1. ค้นหาและปิดการทำงานของ port-forward ตัวเก่าก่อน (ถ้ามี)
          pkill -f "kubectl port-forward" || true
          # 2. ปิด process ที่ใช้ port 30010 อยู่
          fuser -k 30010/tcp || true
          sleep 2
          # 3. รัน port-forward ใหม่
          kubectl port-forward --address 0.0.0.0 service/myapp-service 30011:80 &
